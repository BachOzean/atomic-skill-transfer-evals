task: ext_math_amc23
dataset_path: rawsh/amc23
output_type: generate_until
process_docs: !function utils.process_amc23_docs
training_split: train
validation_split: null
test_split: train
doc_to_text: "{{problem}}\nAnswer:"
doc_to_target: answer
generation_kwargs:
  until:
    - "</s>"
    - "<|im_end|>"
  do_sample: false
  temperature: 0.0
  max_gen_toks: 1024
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
process_results: !function utils.process_results
metadata:
  version: 1.0
