task: ext_math_omni_math_500
dataset_path: simplescaling/omni_math_500
output_type: generate_until
process_docs: !function utils.process_omni_math_500_docs
training_split: train
validation_split: null
test_split: train
doc_to_text: "Problem: {{problem}}\nPlease reason step by step, and put your final answer within \\boxed{}.\nAnswer:"
doc_to_target: answer
generation_kwargs:
  until:
    - "</s>"
    - "<|im_end|>"
  do_sample: false
  temperature: 0.0
  max_gen_toks: 1024
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
process_results: !function utils.process_results
metadata:
  version: 1.0
